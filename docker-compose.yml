services:
  postgres:
    image: postgres:16-alpine
    container_name: avanam-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: avanam
      POSTGRES_PASSWORD: avanam
      POSTGRES_DB: avanam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avanam"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: avanam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avanam-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - faiss_data:/app/data/faiss_index
      - upload_data:/app/data/uploads
    environment:
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - UPLOAD_DIR=/app/data/uploads
      - DATABASE_URL=postgresql+asyncpg://avanam:avanam@postgres:5432/avanam
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: avanam-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment the following for GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: avanam-ollama-pull
    env_file:
      - ./backend/.env
    entrypoint: ["/bin/sh", "-c", "sleep 5 && ollama pull $${LLM_MODEL:-llama3.2:3b}"]
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: avanam-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  faiss_data:
    driver: local
  upload_data:
    driver: local
  ollama_data:
    driver: local
